<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Guide to Medicine Buddha Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lapis: #1a3a6b;
    --lapis-deep: #0d1f3c;
    --lapis-light: #2a5298;
    --gold: #c9a227;
    --gold-light: #e8c96a;
    --gold-pale: #f5e9c4;
    --cream: #fdf8ef;
    --cream-dark: #f0e8d4;
    --parchment: #e8dcc8;
    --text-dark: #1a120a;
    --text-med: #3d2b1a;
    --text-light: #6b5040;
    --lotus-pink: #c97a9a;
    --healing-teal: #2a7a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--lapis-deep);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }

  /* Decorative border pattern */
  .outer-frame {
    min-height: 100vh;
    background: 
      repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(201,162,39,0.05) 8px, rgba(201,162,39,0.05) 9px),
      linear-gradient(180deg, #0d1f3c 0%, #091628 100%);
    position: relative;
  }

  .outer-frame::before, .outer-frame::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
  }

  .outer-frame::before {
    border: 12px solid transparent;
    border-image: linear-gradient(45deg, #c9a227, #f5e9c4, #c9a227, #8b6914, #c9a227, #f5e9c4, #c9a227) 1;
  }

  .inner-wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
  }

  .header-ornament {
    color: var(--gold);
    font-size: 28px;
    letter-spacing: 12px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .author-tag {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.75;
  }

  .main-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 500;
    color: var(--gold-light);
    line-height: 1.3;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(201,162,39,0.3);
  }

  .chinese-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    color: var(--cream-dark);
    opacity: 0.75;
    margin-bottom: 30px;
    font-weight: 300;
  }

  .gold-rule {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  .gold-rule-full {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
    margin: 40px 0;
  }

  /* === IMAGE SECTION === */
  .image-shrine {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 40px 0 60px;
  }

  .image-border {
    position: relative;
    padding: 16px;
    background: linear-gradient(135deg, #c9a227 0%, #f5e9c4 25%, #c9a227 50%, #8b6914 75%, #c9a227 100%);
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(201,162,39,0.25), 0 0 120px rgba(26,58,107,0.4), inset 0 0 30px rgba(0,0,0,0.3);
  }

  .image-border::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,162,39,0.6);
    border-radius: 2px;
    pointer-events: none;
    z-index: 2;
  }

  .buddha-image {
    display: block;
    max-width: 340px;
    width: 100%;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  .image-caption {
    text-align: center;
    margin-top: 20px;
    font-style: italic;
    color: var(--gold-light);
    font-size: 14px;
    opacity: 0.8;
    letter-spacing: 1px;
  }

  .image-caption-chinese {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--cream-dark);
    opacity: 0.55;
    margin-top: 4px;
  }

  /* === INDEX / TABLE OF CONTENTS === */
  .index-section {
    background: rgba(201,162,39,0.06);
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 4px;
    padding: 36px 40px;
    margin-bottom: 60px;
    position: relative;
  }

  .index-section::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .index-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 30px;
    text-transform: uppercase;
  }

  .index-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .index-col-header {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold-light);
    margin-bottom: 16px;
    opacity: 0.7;
    text-transform: uppercase;
  }

  .index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .index-item:hover { opacity: 0.75; }

  .index-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold);
    min-width: 18px;
    opacity: 0.8;
  }

  .index-text {
    font-size: 14px;
    color: var(--cream);
    line-height: 1.4;
    font-weight: 300;
    flex: 1;
  }

  .index-dots {
    border-bottom: 1px dotted rgba(201,162,39,0.25);
    flex: 1;
    min-width: 20px;
    margin-bottom: 3px;
  }

  .index-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    color: var(--cream-dark);
    opacity: 0.55;
    min-width: 60px;
    text-align: right;
  }

  .index-col-divider {
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(201,162,39,0.2), transparent);
    margin: 0 24px;
    align-self: stretch;
  }

  /* === CONTENT SECTIONS === */
  .section {
    margin-bottom: 56px;
    scroll-margin-top: 20px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .section-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    opacity: 0.7;
    min-width: 20px;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--gold-light);
    letter-spacing: 1px;
  }

  .section-title-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--cream-dark);
    opacity: 0.55;
    margin-top: 3px;
    font-weight: 300;
  }

  .section-title-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,162,39,0.3), transparent);
  }

  /* === BILINGUAL BODY TEXT === */
  .bilingual-block {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 0 28px;
    margin-bottom: 20px;
  }

  .col-divider-vert {
    background: linear-gradient(180deg, transparent, rgba(201,162,39,0.2), transparent);
    align-self: stretch;
  }

  .en-text {
    font-size: 16px;
    line-height: 1.85;
    color: var(--cream);
    font-weight: 300;
    font-style: italic;
  }

  .zh-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 1.9;
    color: var(--cream-dark);
    opacity: 0.85;
    font-weight: 300;
  }

  /* === MANTRA BOX === */
  .mantra-box {
    background: rgba(26, 58, 107, 0.4);
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 4px;
    padding: 36px;
    text-align: center;
    margin: 32px 0;
    position: relative;
    overflow: hidden;
  }

  .mantra-box::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,162,39,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .mantra-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .mantra-text {
    font-family: 'Cinzel', serif;
    font-size: clamp(15px, 2.5vw, 20px);
    color: var(--gold-light);
    line-height: 1.7;
    font-weight: 400;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(201,162,39,0.4);
  }

  .mantra-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--cream-dark);
    opacity: 0.65;
    margin-top: 14px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* === VOWS === */
  .vows-block {
    padding: 28px 36px;
    border-left: 2px solid rgba(201,162,39,0.4);
    margin: 24px 0;
    background: rgba(201,162,39,0.04);
  }

  .vow-line {
    font-size: 15px;
    color: var(--cream);
    line-height: 2;
    font-weight: 300;
    font-style: italic;
  }

  .vow-line-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--cream-dark);
    opacity: 0.7;
    line-height: 2;
    font-weight: 300;
  }

  /* === PRACTICES LIST === */
  .practices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin: 24px 0;
  }

  .practice-item {
    background: rgba(42, 122, 122, 0.12);
    border: 1px solid rgba(42, 122, 122, 0.3);
    border-radius: 4px;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .practice-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--healing-teal);
    margin-top: 7px;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(42,122,122,0.5);
  }

  .practice-text {
    font-size: 14px;
    color: var(--cream);
    font-weight: 300;
    line-height: 1.5;
  }

  .practice-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    color: var(--cream-dark);
    opacity: 0.6;
    font-weight: 300;
  }

  /* === FOOTER === */
  .footer {
    text-align: center;
    margin-top: 80px;
    padding-top: 40px;
    border-top: 1px solid rgba(201,162,39,0.2);
  }

  .footer-mantra {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold-light);
    opacity: 0.6;
    margin-bottom: 16px;
  }

  .footer-author {
    font-size: 14px;
    color: var(--cream-dark);
    font-style: italic;
    opacity: 0.6;
  }

  .footer-seal {
    font-size: 36px;
    margin: 24px 0;
    opacity: 0.4;
  }

  @media (max-width: 640px) {
    .inner-wrapper { padding: 40px 20px; }
    .bilingual-block { grid-template-columns: 1fr; gap: 16px; }
    .col-divider-vert { display: none; }
    .index-grid { grid-template-columns: 1fr; }
    .index-col-divider { display: none; }
    .mantra-box { padding: 24px 20px; }
    .vows-block { padding: 20px; }
  }
</style>
